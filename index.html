<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Flip-Dot Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }

    #top-ui {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      align-items: center;
      z-index: 10;
    }
    .img-input {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .img-input label {
      color: rgba(0,0,0,0.6);
      font-size: 13px;
    }
    .img-input .thumb {
      width: 48px;
      height: 28px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.2);
      object-fit: cover;
      cursor: pointer;
    }
    .img-input .thumb.empty {
      background: rgba(0,0,0,0.08);
    }
    .img-input input[type="file"] { display: none; }

    #ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    #ui button {
      padding: 10px 24px;
      border: 1px solid rgba(0,0,0,0.2);
      color: #333;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(10px);
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-anim { background: rgba(0,0,0,0.06); }
    .btn-anim:hover { background: rgba(0,0,0,0.12); }
    .btn-sys { background: rgba(0,0,0,0.06); }
    .btn-sys:hover { background: rgba(0,0,0,0.12); }
  </style>
</head>
<body>
  <div id="top-ui">
    <div class="img-input">
      <label>Front:</label>
      <img id="thumb-front" class="thumb empty" title="Click to load front image">
      <input type="file" id="input-front" accept="image/*">
    </div>
    <div class="img-input">
      <label>Back:</label>
      <img id="thumb-back" class="thumb empty" title="Click to load back image">
      <input type="file" id="input-back" accept="image/*">
    </div>
  </div>

  <div id="ui">
    <button id="btn-ripple" class="btn-anim">Ripple</button>
    <button id="btn-seq-down" class="btn-anim">Down</button>
    <button id="btn-seq-up" class="btn-anim">Up</button>
    <button id="btn-seq-right" class="btn-anim">Right</button>
    <button id="btn-seq-left" class="btn-anim">Left</button>
    <button id="btn-reset" class="btn-sys">Reset</button>
    <button id="btn-glossy" class="btn-sys">Glossy</button>
    <button id="btn-bg" class="btn-sys">BG: White</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
      "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.esm.min.js"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'lil-gui';

    // --- Config (mutable via GUI) ---
    const params = {
      cols: 48,
      rows: 27,
      spacing: 1.0,
      squash: 0.5,
      roughness: 0.3,
      metalness: 0.1,
      flipDuration: 0.2,
      staggerDelay: 0.007,
      lineDelay: 0.08,
    };
    const CROP_SIZE = 64;

    // --- Scene setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 0, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 15;
    controls.maxDistance = 80;

    // --- Lighting ---
    scene.add(new THREE.AmbientLight(0xffffff, 0.35));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 15, 20);
    scene.add(dirLight);
    const sideLight = new THREE.DirectionalLight(0xffffff, 0.4);
    sideLight.position.set(-15, 5, 10);
    scene.add(sideLight);
    const backLight = new THREE.DirectionalLight(0xffffff, 0.25);
    backLight.position.set(-5, -5, -10);
    scene.add(backLight);

    // --- Texture helpers ---
    function createCropCanvas(img, col, row, flipH) {
      const canvas = document.createElement('canvas');
      canvas.width = CROP_SIZE;
      canvas.height = CROP_SIZE;
      const ctx = canvas.getContext('2d');

      const sx = (col / params.cols) * img.width;
      const sy = (row / params.rows) * img.height;
      const sw = img.width / params.cols;
      const sh = img.height / params.rows;

      if (flipH) {
        ctx.translate(CROP_SIZE, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, CROP_SIZE, CROP_SIZE);
      return canvas;
    }

    function createCropTexture(img, col, row, flipH = false) {
      const canvas = createCropCanvas(img, col, row, flipH);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      tex.generateMipmaps = false;
      return tex;
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    // --- Shared geometry builder ---
    const W_SEGS = 32;
    const H_SEGS = 32;

    function buildStoneGeo(radius, squash) {
      const geo = new THREE.SphereGeometry(radius, W_SEGS, H_SEGS);
      const pos = geo.attributes.position;
      const uvs = geo.attributes.uv;

      for (let i = 0; i < pos.count; i++) {
        pos.setY(i, pos.getY(i) * squash);
      }
      pos.needsUpdate = true;

      geo.rotateX(Math.PI / 2);
      geo.computeVertexNormals();

      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        const z = pos.getZ(i);
        const u = (x / radius + 1) / 2;
        if (z >= 0) {
          uvs.setXY(i, u, (y / radius + 1) / 2);
        } else {
          uvs.setXY(i, u, 1 - (y / radius + 1) / 2);
        }
      }
      uvs.needsUpdate = true;

      geo.clearGroups();
      const halfH = H_SEGS / 2;
      const frontCount = W_SEGS * 3 + (halfH - 1) * W_SEGS * 6;
      const backCount  = (halfH - 1) * W_SEGS * 6 + W_SEGS * 3;
      geo.addGroup(0, frontCount, 0);
      geo.addGroup(frontCount, backCount, 1);

      return geo;
    }

    let stoneGeo = buildStoneGeo(params.spacing / 2, params.squash);

    // --- Dot class ---

    class FlipDot {
      constructor(group, col, row, frontTex, backTex) {
        this.group = group;
        this.col = col;
        this.row = row;
        this.frontTex = frontTex;
        this.backTex = backTex;
        this.frontMat = null;
        this.backMat = null;
        this.showingFront = true;
        this.flipping = false;
        this.flipStartTime = 0;
        this.startRotation = 0;
      }

      applyMaterial() {
        for (const mat of [this.frontMat, this.backMat]) {
          if (mat) {
            mat.roughness = params.roughness;
            mat.metalness = params.metalness;
          }
        }
      }

      startFlip(time) {
        if (this.flipping) return;
        this.flipping = true;
        this.flipStartTime = time;
        this.startRotation = this.showingFront ? 0 : Math.PI;
      }

      update(time) {
        if (!this.flipping) return;
        const elapsed = time - this.flipStartTime;
        const t = Math.min(elapsed / params.flipDuration, 1);
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        this.group.rotation.x = this.startRotation + eased * Math.PI;
        if (t >= 1) {
          this.flipping = false;
          this.showingFront = !this.showingFront;
        }
      }

      reset() {
        this.flipping = false;
        this.showingFront = true;
        this.group.rotation.x = 0;
      }

      updateTexture(side, img) {
        const canvas = createCropCanvas(img, this.col, this.row, false);
        if (side === 'front') {
          this.frontTex.image = canvas;
          this.frontTex.needsUpdate = true;
        } else {
          this.backTex.image = canvas;
          this.backTex.needsUpdate = true;
        }
      }
    }

    // --- Main ---
    async function init() {
      let [img1, img2] = await Promise.all([
        loadImage('images/image1.png'),
        loadImage('images/image2.png')
      ]);

      document.getElementById('thumb-front').src = 'images/image1.png';
      document.getElementById('thumb-front').classList.remove('empty');
      document.getElementById('thumb-back').src = 'images/image2.png';
      document.getElementById('thumb-back').classList.remove('empty');

      let dots = [];
      let animating = false;
      let pendingTimers = [];

      function clearPendingTimers() {
        pendingTimers.forEach(id => clearTimeout(id));
        pendingTimers = [];
      }

      function buildDots() {
        clearPendingTimers();
        // Dispose old materials and textures
        dots.forEach(d => {
          if (d.frontMat) { d.frontMat.map?.dispose(); d.frontMat.dispose(); }
          if (d.backMat) { d.backMat.map?.dispose(); d.backMat.dispose(); }
          scene.remove(d.group);
        });
        dots = [];
        animating = false;

        if (stoneGeo) stoneGeo.dispose();
        stoneGeo = buildStoneGeo(params.spacing / 2, params.squash);

        const offsetX = (params.cols - 1) * params.spacing / 2;
        const offsetY = (params.rows - 1) * params.spacing / 2;

        for (let row = 0; row < params.rows; row++) {
          for (let col = 0; col < params.cols; col++) {
            const frontTex = createCropTexture(img1, col, row);
            const backTex = createCropTexture(img2, col, row);

            const frontMat = new THREE.MeshStandardMaterial({
              map: frontTex, roughness: params.roughness, metalness: params.metalness
            });
            const backMat = new THREE.MeshStandardMaterial({
              map: backTex, roughness: params.roughness, metalness: params.metalness
            });

            const stoneMesh = new THREE.Mesh(stoneGeo, [frontMat, backMat]);

            const group = new THREE.Group();
            group.add(stoneMesh);
            group.position.set(
              col * params.spacing - offsetX,
              (params.rows - 1 - row) * params.spacing - offsetY,
              0
            );
            scene.add(group);
            const dot = new FlipDot(group, col, row, frontTex, backTex);
            dot.frontMat = frontMat;
            dot.backMat = backMat;
            dots.push(dot);
          }
        }
      }

      buildDots();

      // --- Image input ---
      function setupImageInput(inputId, thumbId, side) {
        const input = document.getElementById(inputId);
        const thumb = document.getElementById(thumbId);
        thumb.addEventListener('click', () => input.click());
        input.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const url = URL.createObjectURL(file);
          thumb.src = url;
          thumb.classList.remove('empty');
          const img = new Image();
          img.onload = () => {
            if (side === 'front') img1 = img;
            else img2 = img;
            dots.forEach(dot => dot.updateTexture(side, img));
            URL.revokeObjectURL(url);
          };
          img.src = url;
        });
      }

      setupImageInput('input-front', 'thumb-front', 'front');
      setupImageInput('input-back', 'thumb-back', 'back');

      // --- Animation ---

      function triggerRipple() {
        if (animating) return;
        animating = true;
        const centerCol = (params.cols - 1) / 2;
        const centerRow = (params.rows - 1) / 2;
        const indices = dots.map((_, i) => i);
        indices.sort((a, b) => {
          const da = Math.hypot(dots[a].col - centerCol, dots[a].row - centerRow);
          const db = Math.hypot(dots[b].col - centerCol, dots[b].row - centerRow);
          return da - db;
        });
        const totalTime = indices.length * params.staggerDelay + params.flipDuration;
        indices.forEach((idx, i) => {
          pendingTimers.push(setTimeout(() => dots[idx]?.startFlip(clock.getElapsedTime()), i * params.staggerDelay * 1000));
        });
        pendingTimers.push(setTimeout(() => { animating = false; }, totalTime * 1000));
      }

      function triggerSequence(direction) {
        if (animating) return;
        animating = true;
        const groups = new Map();
        dots.forEach((dot, idx) => {
          let key;
          switch (direction) {
            case 'down':  key = dot.row; break;
            case 'up':    key = (params.rows - 1) - dot.row; break;
            case 'right': key = dot.col; break;
            case 'left':  key = (params.cols - 1) - dot.col; break;
          }
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(idx);
        });
        const sortedKeys = [...groups.keys()].sort((a, b) => a - b);
        const totalTime = sortedKeys.length * params.lineDelay + params.flipDuration;
        sortedKeys.forEach((key, lineIdx) => {
          pendingTimers.push(setTimeout(() => {
            const time = clock.getElapsedTime();
            groups.get(key).forEach(idx => dots[idx]?.startFlip(time));
          }, lineIdx * params.lineDelay * 1000));
        });
        pendingTimers.push(setTimeout(() => { animating = false; }, totalTime * 1000));
      }

      function resetDots() {
        clearPendingTimers();
        animating = false;
        dots.forEach(dot => dot.reset());
      }

      // --- UI ---
      document.getElementById('btn-ripple').onclick = () => triggerRipple();
      document.getElementById('btn-seq-down').onclick = () => triggerSequence('down');
      document.getElementById('btn-seq-up').onclick = () => triggerSequence('up');
      document.getElementById('btn-seq-right').onclick = () => triggerSequence('right');
      document.getElementById('btn-seq-left').onclick = () => triggerSequence('left');
      document.getElementById('btn-reset').onclick = () => resetDots();

      const btnGlossy = document.getElementById('btn-glossy');
      btnGlossy.onclick = () => {
        const isGlossy = params.roughness < 0.15;
        params.roughness = isGlossy ? 0.3 : 0.05;
        btnGlossy.textContent = isGlossy ? 'Glossy' : 'Matte';
        dots.forEach(dot => dot.applyMaterial());
        gui.controllersRecursive().forEach(c => c.updateDisplay());
      };

      const bgColors = [
        { name: 'White', scene: 0xffffff, css: '#fff', dark: false },
        { name: 'Black', scene: 0x0a0a0a, css: '#0a0a0a', dark: true },
        { name: 'Gray',  scene: 0x888888, css: '#888', dark: false },
      ];
      let bgIdx = 0;
      const btnBg = document.getElementById('btn-bg');

      function applyBgTheme(bg) {
        scene.background = new THREE.Color(bg.scene);
        document.body.style.background = bg.css;
        btnBg.textContent = 'BG: ' + bg.name;
        // Switch UI colors for dark/light backgrounds
        const uiButtons = document.querySelectorAll('#ui button');
        const labels = document.querySelectorAll('.img-input label');
        const thumbs = document.querySelectorAll('.img-input .thumb');
        if (bg.dark) {
          uiButtons.forEach(b => { b.style.color = '#fff'; b.style.borderColor = 'rgba(255,255,255,0.3)'; b.style.background = 'rgba(255,255,255,0.08)'; });
          labels.forEach(l => l.style.color = 'rgba(255,255,255,0.7)');
          thumbs.forEach(t => t.style.borderColor = 'rgba(255,255,255,0.3)');
        } else {
          uiButtons.forEach(b => { b.style.color = '#333'; b.style.borderColor = 'rgba(0,0,0,0.2)'; b.style.background = 'rgba(0,0,0,0.06)'; });
          labels.forEach(l => l.style.color = 'rgba(0,0,0,0.6)');
          thumbs.forEach(t => t.style.borderColor = 'rgba(0,0,0,0.2)');
        }
      }

      btnBg.onclick = () => {
        bgIdx = (bgIdx + 1) % bgColors.length;
        applyBgTheme(bgColors[bgIdx]);
      };

      // --- GUI ---
      const gui = new GUI({ title: 'Parameters' });

      // FPS display
      const fpsData = { fps: '0' };
      gui.add(fpsData, 'fps').name('FPS').disable();

      const gridFolder = gui.addFolder('Grid');
      gridFolder.add(params, 'cols', 4, 96, 1).name('Columns').onFinishChange(buildDots);
      gridFolder.add(params, 'rows', 4, 54, 1).name('Rows').onFinishChange(buildDots);
      gridFolder.add(params, 'spacing', 0.5, 2.0, 0.05).name('Spacing').onFinishChange(buildDots);
      gridFolder.add(params, 'squash', 0.1, 1.0, 0.05).name('Squash').onFinishChange(buildDots);

      const matFolder = gui.addFolder('Material');
      matFolder.add(params, 'roughness', 0, 1, 0.01).name('Roughness').onChange(() => {
        dots.forEach(dot => dot.applyMaterial());
      });
      matFolder.add(params, 'metalness', 0, 1, 0.01).name('Metalness').onChange(() => {
        dots.forEach(dot => dot.applyMaterial());
      });

      const animFolder = gui.addFolder('Animation');
      animFolder.add(params, 'flipDuration', 0.05, 1.0, 0.01).name('Flip Duration');
      animFolder.add(params, 'staggerDelay', 0.001, 0.05, 0.001).name('Stagger Delay');
      animFolder.add(params, 'lineDelay', 0.01, 0.3, 0.01).name('Line Delay');

      // Shortcuts hint below GUI
      const hint = document.createElement('div');
      hint.style.cssText = 'padding:6px 10px;font:11px monospace;color:rgba(255,255,255,0.5);background:rgba(0,0,0,0.3);border-radius:0 0 4px 4px;';
      hint.textContent = 'A: toggle GUI  |  D: toggle UI';
      gui.domElement.appendChild(hint);

      // --- Keyboard toggles ---
      const topUi = document.getElementById('top-ui');
      const bottomUi = document.getElementById('ui');
      window.addEventListener('keydown', (e) => {
        if (e.key === 'a' || e.key === 'A') {
          gui.domElement.style.display = gui.domElement.style.display === 'none' ? '' : 'none';
        }
        if (e.key === 'd' || e.key === 'D') {
          const hidden = topUi.style.display === 'none';
          topUi.style.display = hidden ? '' : 'none';
          bottomUi.style.display = hidden ? '' : 'none';
        }
      });

      // --- Render loop ---
      const clock = new THREE.Clock();
      let frameCount = 0;
      let lastFpsTime = performance.now();
      const fpsCtrl = gui.controllersRecursive().find(c => c.property === 'fps');

      function animate() {
        requestAnimationFrame(animate);
        dots.forEach(dot => dot.update(clock.getElapsedTime()));
        controls.update();
        renderer.render(scene, camera);

        frameCount++;
        const now = performance.now();
        if (now - lastFpsTime >= 500) {
          fpsData.fps = (frameCount / ((now - lastFpsTime) / 1000)).toFixed(0);
          frameCount = 0;
          lastFpsTime = now;
          if (fpsCtrl) fpsCtrl.updateDisplay();
        }
      }
      animate();
    }

    init().catch(e => {
      console.error('init failed:', e);
      document.body.insertAdjacentHTML('afterbegin',
        `<pre style="color:red;padding:20px;font:14px monospace;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;background:#fff;border:2px solid red;max-width:80%">${e.message}\n${e.stack}</pre>`);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
