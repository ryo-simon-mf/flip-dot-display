<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Flip-Dot Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }

    #top-ui {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      align-items: center;
      z-index: 10;
    }
    .img-input {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .img-input label {
      color: rgba(0,0,0,0.6);
      font-size: 13px;
    }
    .img-input .thumb {
      width: 48px;
      height: 28px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.2);
      object-fit: cover;
      cursor: pointer;
    }
    .img-input .thumb.empty {
      background: rgba(0,0,0,0.08);
    }
    .img-input input[type="file"] { display: none; }

    #ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    #ui button {
      padding: 10px 24px;
      border: 1px solid rgba(0,0,0,0.2);
      color: #333;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(10px);
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-anim { background: rgba(0,0,0,0.06); }
    .btn-anim:hover { background: rgba(0,0,0,0.12); }
    .btn-sys { background: rgba(0,0,0,0.06); }
    .btn-sys:hover { background: rgba(0,0,0,0.12); }
    .btn-anim.active { background: rgba(0,120,255,0.2); border-color: rgba(0,120,255,0.5); color: #0066cc; }
  </style>
</head>
<body>
  <div id="top-ui">
    <div class="img-input">
      <label>Front:</label>
      <img id="thumb-front" class="thumb empty" title="Click to load front image">
      <input type="file" id="input-front" accept="image/*">
    </div>
    <div class="img-input">
      <label>Back:</label>
      <img id="thumb-back" class="thumb empty" title="Click to load back image">
      <input type="file" id="input-back" accept="image/*">
    </div>
  </div>

  <div id="ui">
    <button id="btn-ripple" class="btn-anim">Ripple</button>
    <button id="btn-seq-down" class="btn-anim">Down</button>
    <button id="btn-seq-up" class="btn-anim">Up</button>
    <button id="btn-seq-right" class="btn-anim">Right</button>
    <button id="btn-seq-left" class="btn-anim">Left</button>
    <button id="btn-wind" class="btn-anim">Wind</button>
    <button id="btn-mouse-trail" class="btn-anim">Mouse Trail</button>
    <button id="btn-reset" class="btn-sys">Reset</button>
    <button id="btn-shape" class="btn-sys">Shape: Round</button>
    <button id="btn-glossy" class="btn-sys">Glossy</button>
    <button id="btn-bg" class="btn-sys">BG: White</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
      "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.esm.min.js"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'lil-gui';

    // --- Config (mutable via GUI) ---
    const params = {
      cols: 48,
      rows: 27,
      spacing: 1.0,
      squash: 0.5,
      roughness: 0.3,
      metalness: 0.1,
      flipDuration: 0.2,
      staggerDelay: 0.007,
      lineDelay: 0.08,
      trailRadius: 1.5,
      trailGradient: 0.03,
      dotShape: 'round',
    };
    const CROP_SIZE = 64;

    // --- Scene setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 0, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 15;
    controls.maxDistance = 80;

    // --- Lighting ---
    scene.add(new THREE.AmbientLight(0xffffff, 0.35));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 15, 20);
    scene.add(dirLight);
    const sideLight = new THREE.DirectionalLight(0xffffff, 0.4);
    sideLight.position.set(-15, 5, 10);
    scene.add(sideLight);
    const backLight = new THREE.DirectionalLight(0xffffff, 0.25);
    backLight.position.set(-5, -5, -10);
    scene.add(backLight);

    // --- Texture helpers ---
    function createCropCanvas(img, col, row, flipH) {
      const canvas = document.createElement('canvas');
      canvas.width = CROP_SIZE;
      canvas.height = CROP_SIZE;
      const ctx = canvas.getContext('2d');

      const sx = (col / params.cols) * img.width;
      const sy = (row / params.rows) * img.height;
      const sw = img.width / params.cols;
      const sh = img.height / params.rows;

      if (flipH) {
        ctx.translate(CROP_SIZE, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, CROP_SIZE, CROP_SIZE);
      return canvas;
    }

    function createCropTexture(img, col, row, flipH = false) {
      const canvas = createCropCanvas(img, col, row, flipH);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      tex.generateMipmaps = false;
      return tex;
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    // --- Shared geometry builder ---
    const W_SEGS = 32;
    const H_SEGS = 32;

    function buildStoneGeo(radius, squash) {
      const geo = new THREE.SphereGeometry(radius, W_SEGS, H_SEGS);
      const pos = geo.attributes.position;
      const uvs = geo.attributes.uv;

      for (let i = 0; i < pos.count; i++) {
        pos.setY(i, pos.getY(i) * squash);
      }
      pos.needsUpdate = true;

      geo.rotateX(Math.PI / 2);
      geo.computeVertexNormals();

      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        const z = pos.getZ(i);
        const u = (x / radius + 1) / 2;
        if (z >= 0) {
          uvs.setXY(i, u, (y / radius + 1) / 2);
        } else {
          uvs.setXY(i, u, 1 - (y / radius + 1) / 2);
        }
      }
      uvs.needsUpdate = true;

      geo.clearGroups();
      const halfH = H_SEGS / 2;
      const frontCount = W_SEGS * 3 + (halfH - 1) * W_SEGS * 6;
      const backCount  = (halfH - 1) * W_SEGS * 6 + W_SEGS * 3;
      geo.addGroup(0, frontCount, 0);
      geo.addGroup(frontCount, backCount, 1);

      return geo;
    }

    function buildBoxGeo(size, squash) {
      const s = size * 2 * 0.92;
      const geo = new THREE.BoxGeometry(s, s, size * 2 * squash);
      // Remap back face (-Z) UVs to match sphere convention: u=(x/R+1)/2, v=(-y/R+1)/2
      // BoxGeometry: 4 verts per face, back face = vertices 20-23
      const uvs = geo.attributes.uv;
      const pos = geo.attributes.position;
      const R = s / 2;
      for (let i = 20; i < 24; i++) {
        uvs.setXY(i, (pos.getX(i) / R + 1) / 2, (-pos.getY(i) / R + 1) / 2);
      }
      uvs.needsUpdate = true;
      // Groups: 0=+X,1=-X,2=+Y,3=-Y (sides), 4=+Z (front), 5=-Z (back)
      geo.clearGroups();
      geo.addGroup(0, 24, 2);   // 4 side faces → material 2
      geo.addGroup(24, 6, 0);   // +Z front → material 0
      geo.addGroup(30, 6, 1);   // -Z back → material 1
      return geo;
    }

    let stoneGeo = buildStoneGeo(params.spacing / 2, params.squash);
    let sideMat = null; // shared side material for box shape

    // --- Dot class ---

    const _flipQuat = new THREE.Quaternion();
    const _rotMat = new THREE.Matrix4();

    class FlipDot {
      constructor(group, col, row, frontTex, backTex) {
        this.group = group;
        this.col = col;
        this.row = row;
        this.frontTex = frontTex;
        this.backTex = backTex;
        this.frontMat = null;
        this.backMat = null;
        this.showingFront = true;
        this.flipping = false;
        this.flipStartTime = 0;
        this.startQuat = new THREE.Quaternion();
        this.targetQuat = new THREE.Quaternion();
        // Disable auto UV matrix so we can control it for axis correction
        frontTex.matrixAutoUpdate = false;
        frontTex.matrix.identity();
        backTex.matrixAutoUpdate = false;
        backTex.matrix.identity();
      }

      applyMaterial() {
        for (const mat of [this.frontMat, this.backMat, sideMat]) {
          if (mat) {
            mat.roughness = params.roughness;
            mat.metalness = params.metalness;
          }
        }
      }

      startFlip(time, axis) {
        if (this.flipping) return;
        this.flipping = true;
        this.flipStartTime = time;
        this.startQuat.copy(this.group.quaternion);
        _flipQuat.setFromAxisAngle(axis, Math.PI);
        this.targetQuat.copy(_flipQuat).multiply(this.startQuat);
      }

      update(time) {
        if (!this.flipping) return;
        const elapsed = time - this.flipStartTime;
        const t = Math.min(elapsed / params.flipDuration, 1);
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        this.group.quaternion.slerpQuaternions(this.startQuat, this.targetQuat, eased);
        if (t >= 1) {
          this.flipping = false;
          this.showingFront = !this.showingFront;
          this._correctUV();
        }
      }

      _correctUV() {
        _rotMat.makeRotationFromQuaternion(this.group.quaternion);
        const e = _rotMat.elements;
        // e[0]=Rxx, e[1]=Ryx, e[4]=Rxy, e[5]=Ryy
        if (this.showingFront) {
          // Front UV: u=(x/R+1)/2, v=(y/R+1)/2
          this.frontTex.matrix.set(
            e[0],  e[4], (1 - e[0] - e[4]) / 2,
            e[1],  e[5], (1 - e[1] - e[5]) / 2,
            0, 0, 1
          );
        } else {
          // Back UV: u=(x/R+1)/2, v=(-y/R+1)/2 → y/R = 1-2v
          this.backTex.matrix.set(
            e[0], -e[4], (1 - e[0] + e[4]) / 2,
            e[1], -e[5], (1 - e[1] + e[5]) / 2,
            0, 0, 1
          );
        }
      }

      reset() {
        this.flipping = false;
        this.showingFront = true;
        this.group.quaternion.identity();
        this.frontTex.matrix.identity();
        this.backTex.matrix.identity();
      }

      updateTexture(side, img) {
        const canvas = createCropCanvas(img, this.col, this.row, false);
        if (side === 'front') {
          this.frontTex.image = canvas;
          this.frontTex.needsUpdate = true;
        } else {
          this.backTex.image = canvas;
          this.backTex.needsUpdate = true;
        }
      }
    }

    // --- Main ---
    async function init() {
      let [img1, img2] = await Promise.all([
        loadImage('images/image1.png'),
        loadImage('images/image2.png')
      ]);

      document.getElementById('thumb-front').src = 'images/image1.png';
      document.getElementById('thumb-front').classList.remove('empty');
      document.getElementById('thumb-back').src = 'images/image2.png';
      document.getElementById('thumb-back').classList.remove('empty');

      let dots = [];
      let animating = false;
      let pendingTimers = [];

      function clearPendingTimers() {
        pendingTimers.forEach(id => clearTimeout(id));
        pendingTimers = [];
      }

      function buildDots() {
        clearPendingTimers();
        // Dispose old materials and textures
        dots.forEach(d => {
          if (d.frontMat) { d.frontMat.map?.dispose(); d.frontMat.dispose(); }
          if (d.backMat) { d.backMat.map?.dispose(); d.backMat.dispose(); }
          scene.remove(d.group);
        });
        dots = [];
        animating = false;

        if (stoneGeo) stoneGeo.dispose();
        const isBox = params.dotShape === 'square';
        stoneGeo = isBox
          ? buildBoxGeo(params.spacing / 2, params.squash)
          : buildStoneGeo(params.spacing / 2, params.squash);

        if (sideMat) sideMat.dispose();
        sideMat = isBox
          ? new THREE.MeshStandardMaterial({ color: 0x222222, roughness: params.roughness, metalness: params.metalness })
          : null;

        const offsetX = (params.cols - 1) * params.spacing / 2;
        const offsetY = (params.rows - 1) * params.spacing / 2;

        for (let row = 0; row < params.rows; row++) {
          for (let col = 0; col < params.cols; col++) {
            const frontTex = createCropTexture(img1, col, row);
            const backTex = createCropTexture(img2, col, row);

            const frontMat = new THREE.MeshStandardMaterial({
              map: frontTex, roughness: params.roughness, metalness: params.metalness
            });
            const backMat = new THREE.MeshStandardMaterial({
              map: backTex, roughness: params.roughness, metalness: params.metalness
            });

            const mats = isBox ? [frontMat, backMat, sideMat] : [frontMat, backMat];
            const stoneMesh = new THREE.Mesh(stoneGeo, mats);

            const group = new THREE.Group();
            group.add(stoneMesh);
            group.position.set(
              col * params.spacing - offsetX,
              (params.rows - 1 - row) * params.spacing - offsetY,
              0
            );
            scene.add(group);
            const dot = new FlipDot(group, col, row, frontTex, backTex);
            dot.frontMat = frontMat;
            dot.backMat = backMat;
            dots.push(dot);
          }
        }
      }

      buildDots();

      // --- Image input ---
      function setupImageInput(inputId, thumbId, side) {
        const input = document.getElementById(inputId);
        const thumb = document.getElementById(thumbId);
        thumb.addEventListener('click', () => input.click());
        input.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const url = URL.createObjectURL(file);
          thumb.src = url;
          thumb.classList.remove('empty');
          const img = new Image();
          img.onload = () => {
            if (side === 'front') img1 = img;
            else img2 = img;
            dots.forEach(dot => dot.updateTexture(side, img));
            URL.revokeObjectURL(url);
          };
          img.src = url;
        });
      }

      setupImageInput('input-front', 'thumb-front', 'front');
      setupImageInput('input-back', 'thumb-back', 'back');

      // --- Animation ---
      const AXIS_DOWN  = new THREE.Vector3(-1, 0, 0);  // top edge tilts away
      const AXIS_UP    = new THREE.Vector3(1, 0, 0);   // bottom edge tilts away
      const AXIS_RIGHT = new THREE.Vector3(0, -1, 0);  // left edge tilts away
      const AXIS_LEFT  = new THREE.Vector3(0, 1, 0);   // right edge tilts away

      function triggerRipple() {
        if (animating) return;
        animating = true;
        const centerCol = (params.cols - 1) / 2;
        const centerRow = (params.rows - 1) / 2;
        const indices = dots.map((_, i) => i);
        indices.sort((a, b) => {
          const da = Math.hypot(dots[a].col - centerCol, dots[a].row - centerRow);
          const db = Math.hypot(dots[b].col - centerCol, dots[b].row - centerRow);
          return da - db;
        });
        const rippleAxes = indices.map(idx => {
          const dx = dots[idx].col - centerCol;
          const dy = -(dots[idx].row - centerRow);
          const len = Math.hypot(dx, dy) || 1;
          return new THREE.Vector3(dy / len, -dx / len, 0); // center-facing edge tilts away
        });
        const totalTime = indices.length * params.staggerDelay + params.flipDuration;
        indices.forEach((idx, i) => {
          const axis = rippleAxes[i];
          pendingTimers.push(setTimeout(() => dots[idx]?.startFlip(clock.getElapsedTime(), axis), i * params.staggerDelay * 1000));
        });
        pendingTimers.push(setTimeout(() => { animating = false; }, totalTime * 1000));
      }

      function triggerSequence(direction) {
        if (animating) return;
        animating = true;
        const axis = { down: AXIS_DOWN, up: AXIS_UP, right: AXIS_RIGHT, left: AXIS_LEFT }[direction];
        const groups = new Map();
        dots.forEach((dot, idx) => {
          let key;
          switch (direction) {
            case 'down':  key = dot.row; break;
            case 'up':    key = (params.rows - 1) - dot.row; break;
            case 'right': key = dot.col; break;
            case 'left':  key = (params.cols - 1) - dot.col; break;
          }
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(idx);
        });
        const sortedKeys = [...groups.keys()].sort((a, b) => a - b);
        const totalTime = sortedKeys.length * params.lineDelay + params.flipDuration;
        sortedKeys.forEach((key, lineIdx) => {
          pendingTimers.push(setTimeout(() => {
            const time = clock.getElapsedTime();
            groups.get(key).forEach(idx => dots[idx]?.startFlip(time, axis));
          }, lineIdx * params.lineDelay * 1000));
        });
        pendingTimers.push(setTimeout(() => { animating = false; }, totalTime * 1000));
      }

      function triggerWind() {
        if (animating) return;
        animating = true;

        // Random wind angle
        const angle = Math.random() * Math.PI * 2;
        const windX = Math.cos(angle);
        const windY = Math.sin(angle);
        const flipAxis = new THREE.Vector3(windY, -windX, 0);

        const offsetX = (params.cols - 1) * params.spacing / 2;
        const offsetY = (params.rows - 1) * params.spacing / 2;

        // Project all dots onto wind direction
        const allDots = dots.map((dot, idx) => {
          const wx = dot.col * params.spacing - offsetX;
          const wy = (params.rows - 1 - dot.row) * params.spacing - offsetY;
          const proj = wx * windX + wy * windY;
          // Perpendicular distance for turbulence
          const perp = Math.abs(wx * windY - wy * windX);
          return { idx, proj, perp };
        });
        allDots.sort((a, b) => a.proj - b.proj);

        // Group into lines
        const lines = [];
        let curDots = [allDots[0]];
        let curProj = allDots[0].proj;
        for (let i = 1; i < allDots.length; i++) {
          if (allDots[i].proj - curProj > params.spacing * 0.5) {
            lines.push(curDots);
            curDots = [];
            curProj = allDots[i].proj;
          }
          curDots.push(allDots[i]);
        }
        lines.push(curDots);

        // Schedule with line delay + per-dot turbulence jitter
        let maxDelay = 0;
        lines.forEach((line, lineIdx) => {
          line.forEach(({ idx, perp }) => {
            const baseDelay = lineIdx * params.lineDelay * 1000;
            const jitter = (Math.random() * 0.4 + 0.8) * perp * 8;
            const delay = baseDelay + jitter;
            if (delay > maxDelay) maxDelay = delay;
            pendingTimers.push(setTimeout(() => {
              dots[idx]?.startFlip(clock.getElapsedTime(), flipAxis);
            }, delay));
          });
        });
        pendingTimers.push(setTimeout(() => { animating = false; }, maxDelay + params.flipDuration * 1000));
      }

      function resetDots() {
        clearPendingTimers();
        animating = false;
        mouseTrailMode = 'off';
        btnMouseTrail.textContent = 'Mouse Trail';
        isDragging = false;
        lastMouseWorld = null;
        sweepDir = null;
        sweepAxis = null;
        sweepLines = null;
        sweepLineIdx = 0;
        sweepStartWorld = null;
        sweepLastProj = 0;
        sweepLastTime = 0;
        sweepLineDelay = 0;
        btnMouseTrail.classList.remove('active');
        controls.enabled = true;
        dots.forEach(dot => dot.reset());
      }

      // --- Mouse Trail (column sweep) ---
      let mouseTrailMode = 'off'; // 'off' | 'straight' | 'chevron'
      let isDragging = false;
      let lastMouseWorld = null;
      const _mouseNDC = new THREE.Vector2();
      const _planeZ0 = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
      const _intersect = new THREE.Vector3();
      const _raycaster = new THREE.Raycaster();
      const btnMouseTrail = document.getElementById('btn-mouse-trail');

      // Sweep state
      let sweepDir = null;      // { x, y } normalized
      let sweepAxis = null;     // THREE.Vector3 flip axis
      let sweepLines = null;    // [{ proj, dots: [{ idx, perpDist }] }] sorted by projection
      let sweepLineIdx = 0;     // how many lines already triggered
      let sweepStartWorld = null;
      let sweepLastProj = 0;
      let sweepLastTime = 0;
      let sweepLineDelay = 0;   // ms per line, derived from mouse speed

      function mouseToWorld(cx, cy) {
        _mouseNDC.x = (cx / window.innerWidth) * 2 - 1;
        _mouseNDC.y = -(cy / window.innerHeight) * 2 + 1;
        _raycaster.setFromCamera(_mouseNDC, camera);
        return _raycaster.ray.intersectPlane(_planeZ0, _intersect) ? _intersect.clone() : null;
      }

      function initSweep(fromWorld, toWorld) {
        const dx = toWorld.x - fromWorld.x;
        const dy = toWorld.y - fromWorld.y;
        const len = Math.hypot(dx, dy);
        if (len < params.spacing * 0.5) return false;

        sweepDir = { x: dx / len, y: dy / len };
        sweepAxis = new THREE.Vector3(sweepDir.y, -sweepDir.x, 0); // wave-source edge tilts away
        sweepStartWorld = fromWorld.clone();

        const offsetX = (params.cols - 1) * params.spacing / 2;
        const offsetY = (params.rows - 1) * params.spacing / 2;
        const sx = fromWorld.x, sy = fromWorld.y;

        // Project all dots onto sweep direction + compute perpendicular distance from path
        const allDots = dots.map((dot, idx) => {
          const wx = dot.col * params.spacing - offsetX;
          const wy = (params.rows - 1 - dot.row) * params.spacing - offsetY;
          const proj = (wx - sx) * sweepDir.x + (wy - sy) * sweepDir.y;
          const perpDist = Math.abs((wx - sx) * sweepDir.y - (wy - sy) * sweepDir.x);
          return { idx, proj, perpDist };
        });
        allDots.sort((a, b) => a.proj - b.proj);

        // Group into lines by projection
        sweepLines = [];
        let curDots = [{ idx: allDots[0].idx, perpDist: allDots[0].perpDist }];
        let curProj = allDots[0].proj;
        for (let i = 1; i < allDots.length; i++) {
          if (allDots[i].proj - curProj > params.spacing * 0.5) {
            sweepLines.push({ proj: curProj, dots: curDots });
            curDots = [];
            curProj = allDots[i].proj;
          }
          curDots.push({ idx: allDots[i].idx, perpDist: allDots[i].perpDist });
        }
        sweepLines.push({ proj: curProj, dots: curDots });
        sweepLineIdx = 0;
        sweepLastProj = sweepLines.length > 0 ? sweepLines[0].proj : 0;
        sweepLastTime = performance.now();
        sweepLineDelay = params.lineDelay * 1000;
        return true;
      }

      function flipLineWithGradient(line, axis) {
        if (mouseTrailMode === 'chevron' && params.trailGradient > 0) {
          line.dots.forEach(d => {
            const delay = d.perpDist * params.trailGradient * 1000;
            pendingTimers.push(setTimeout(() => {
              dots[d.idx]?.startFlip(clock.getElapsedTime(), axis);
            }, delay));
          });
        } else {
          const time = clock.getElapsedTime();
          line.dots.forEach(d => dots[d.idx]?.startFlip(time, axis));
        }
      }

      function updateSweep(worldPos) {
        if (!sweepDir || !sweepLines || !sweepStartWorld) return;
        const mouseProj = (worldPos.x - sweepStartWorld.x) * sweepDir.x
                        + (worldPos.y - sweepStartWorld.y) * sweepDir.y;
        const prevIdx = sweepLineIdx;
        while (sweepLineIdx < sweepLines.length && sweepLines[sweepLineIdx].proj <= mouseProj) {
          flipLineWithGradient(sweepLines[sweepLineIdx], sweepAxis);
          sweepLineIdx++;
        }
        // Update speed measurement when lines were triggered
        if (sweepLineIdx > prevIdx) {
          const now = performance.now();
          const dt = now - sweepLastTime;
          const linesAdvanced = sweepLineIdx - prevIdx;
          if (dt > 0 && linesAdvanced > 0) {
            sweepLineDelay = dt / linesAdvanced;
          }
          sweepLastTime = now;
        }
      }

      function handleTrailMove(cx, cy) {
        const cur = mouseToWorld(cx, cy);
        if (!cur) return;
        if (!sweepDir && lastMouseWorld) {
          initSweep(lastMouseWorld, cur);
        }
        if (sweepDir) {
          updateSweep(cur);
        }
        lastMouseWorld = cur;
      }

      function endTrailDrag() {
        // Sweep remaining lines at the same speed the mouse was moving
        if (isDragging && sweepLines && sweepAxis) {
          const remaining = sweepLines.slice(sweepLineIdx);
          const axis = sweepAxis;
          const delay = Math.max(1, sweepLineDelay); // ms per line from mouse speed
          remaining.forEach((line, i) => {
            pendingTimers.push(setTimeout(() => {
              flipLineWithGradient(line, axis);
            }, i * delay));
          });
        }
        isDragging = false;
        lastMouseWorld = null;
        sweepDir = null;
        sweepAxis = null;
        sweepLines = null;
        sweepLineIdx = 0;
        sweepStartWorld = null;
        sweepLastProj = 0;
        sweepLastTime = 0;
        sweepLineDelay = 0;
      }

      const canvas = renderer.domElement;
      canvas.addEventListener('mousedown', (e) => {
        if (mouseTrailMode === 'off' || e.button !== 0) return;
        isDragging = true;
        lastMouseWorld = mouseToWorld(e.clientX, e.clientY);
        trailStartWorld = lastMouseWorld?.clone() || null;
      });
      canvas.addEventListener('mousemove', (e) => {
        if (mouseTrailMode === 'off' || !isDragging) return;
        handleTrailMove(e.clientX, e.clientY);
      });
      canvas.addEventListener('mouseup', () => endTrailDrag());
      canvas.addEventListener('mouseleave', () => endTrailDrag());

      canvas.addEventListener('touchstart', (e) => {
        if (mouseTrailMode === 'off') return;
        e.preventDefault();
        isDragging = true;
        lastMouseWorld = mouseToWorld(e.touches[0].clientX, e.touches[0].clientY);
        trailStartWorld = lastMouseWorld?.clone() || null;
      }, { passive: false });
      canvas.addEventListener('touchmove', (e) => {
        if (mouseTrailMode === 'off' || !isDragging) return;
        e.preventDefault();
        handleTrailMove(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });
      canvas.addEventListener('touchend', () => endTrailDrag());

      // --- UI ---
      document.getElementById('btn-ripple').onclick = () => triggerRipple();
      document.getElementById('btn-seq-down').onclick = () => triggerSequence('down');
      document.getElementById('btn-seq-up').onclick = () => triggerSequence('up');
      document.getElementById('btn-seq-right').onclick = () => triggerSequence('right');
      document.getElementById('btn-seq-left').onclick = () => triggerSequence('left');
      document.getElementById('btn-wind').onclick = () => triggerWind();
      btnMouseTrail.onclick = () => {
        const modes = ['off', 'straight', 'chevron'];
        const labels = { off: 'Mouse Trail', straight: 'Trail: Straight', chevron: 'Trail: Chevron' };
        const idx = (modes.indexOf(mouseTrailMode) + 1) % modes.length;
        mouseTrailMode = modes[idx];
        btnMouseTrail.textContent = labels[mouseTrailMode];
        btnMouseTrail.classList.toggle('active', mouseTrailMode !== 'off');
        controls.enabled = mouseTrailMode === 'off';
      };
      document.getElementById('btn-reset').onclick = () => resetDots();

      const btnShape = document.getElementById('btn-shape');
      btnShape.onclick = () => {
        params.dotShape = params.dotShape === 'round' ? 'square' : 'round';
        btnShape.textContent = 'Shape: ' + (params.dotShape === 'round' ? 'Round' : 'Square');
        buildDots();
      };

      const btnGlossy = document.getElementById('btn-glossy');
      btnGlossy.onclick = () => {
        const isGlossy = params.roughness < 0.15;
        params.roughness = isGlossy ? 0.3 : 0.05;
        btnGlossy.textContent = isGlossy ? 'Glossy' : 'Matte';
        dots.forEach(dot => dot.applyMaterial());
        gui.controllersRecursive().forEach(c => c.updateDisplay());
      };

      const bgColors = [
        { name: 'White', scene: 0xffffff, css: '#fff', dark: false },
        { name: 'Black', scene: 0x0a0a0a, css: '#0a0a0a', dark: true },
        { name: 'Gray',  scene: 0x888888, css: '#888', dark: false },
      ];
      let bgIdx = 0;
      const btnBg = document.getElementById('btn-bg');

      function applyBgTheme(bg) {
        scene.background = new THREE.Color(bg.scene);
        document.body.style.background = bg.css;
        btnBg.textContent = 'BG: ' + bg.name;
        // Switch UI colors for dark/light backgrounds
        const uiButtons = document.querySelectorAll('#ui button');
        const labels = document.querySelectorAll('.img-input label');
        const thumbs = document.querySelectorAll('.img-input .thumb');
        if (bg.dark) {
          uiButtons.forEach(b => { b.style.color = '#fff'; b.style.borderColor = 'rgba(255,255,255,0.3)'; b.style.background = 'rgba(255,255,255,0.08)'; });
          labels.forEach(l => l.style.color = 'rgba(255,255,255,0.7)');
          thumbs.forEach(t => t.style.borderColor = 'rgba(255,255,255,0.3)');
        } else {
          uiButtons.forEach(b => { b.style.color = '#333'; b.style.borderColor = 'rgba(0,0,0,0.2)'; b.style.background = 'rgba(0,0,0,0.06)'; });
          labels.forEach(l => l.style.color = 'rgba(0,0,0,0.6)');
          thumbs.forEach(t => t.style.borderColor = 'rgba(0,0,0,0.2)');
        }
        if (btnMouseTrail.classList.contains('active')) {
          btnMouseTrail.style.background = 'rgba(0,120,255,0.2)';
          btnMouseTrail.style.borderColor = 'rgba(0,120,255,0.5)';
          btnMouseTrail.style.color = bg.dark ? '#66aaff' : '#0066cc';
        }
      }

      btnBg.onclick = () => {
        bgIdx = (bgIdx + 1) % bgColors.length;
        applyBgTheme(bgColors[bgIdx]);
      };

      // --- GUI ---
      const gui = new GUI({ title: 'Parameters' });

      // FPS display
      const fpsData = { fps: '0' };
      gui.add(fpsData, 'fps').name('FPS').disable();

      const gridFolder = gui.addFolder('Grid');
      gridFolder.add(params, 'cols', 4, 96, 1).name('Columns').onFinishChange(buildDots);
      gridFolder.add(params, 'rows', 4, 54, 1).name('Rows').onFinishChange(buildDots);
      gridFolder.add(params, 'spacing', 0.5, 2.0, 0.05).name('Spacing').onFinishChange(buildDots);
      gridFolder.add(params, 'squash', 0.1, 1.0, 0.05).name('Squash').onFinishChange(buildDots);

      const matFolder = gui.addFolder('Material');
      matFolder.add(params, 'roughness', 0, 1, 0.01).name('Roughness').onChange(() => {
        dots.forEach(dot => dot.applyMaterial());
      });
      matFolder.add(params, 'metalness', 0, 1, 0.01).name('Metalness').onChange(() => {
        dots.forEach(dot => dot.applyMaterial());
      });

      const animFolder = gui.addFolder('Animation');
      animFolder.add(params, 'flipDuration', 0.05, 1.0, 0.01).name('Flip Duration');
      animFolder.add(params, 'staggerDelay', 0.001, 0.05, 0.001).name('Stagger Delay');
      animFolder.add(params, 'lineDelay', 0.01, 0.3, 0.01).name('Line Delay');
      animFolder.add(params, 'trailRadius', 0.5, 5.0, 0.1).name('Trail Radius');
      animFolder.add(params, 'trailGradient', 0, 0.15, 0.005).name('Trail Gradient');

      // Shortcuts hint below GUI
      const hint = document.createElement('div');
      hint.style.cssText = 'padding:6px 10px;font:11px monospace;color:rgba(255,255,255,0.5);background:rgba(0,0,0,0.3);border-radius:0 0 4px 4px;';
      hint.textContent = 'A: GUI  |  D: UI  |  M: Mouse Trail';
      gui.domElement.appendChild(hint);

      // --- Keyboard toggles ---
      const topUi = document.getElementById('top-ui');
      const bottomUi = document.getElementById('ui');
      window.addEventListener('keydown', (e) => {
        if (e.key === 'a' || e.key === 'A') {
          gui.domElement.style.display = gui.domElement.style.display === 'none' ? '' : 'none';
        }
        if (e.key === 'm' || e.key === 'M') {
          btnMouseTrail.click();
        }
        if (e.key === 'd' || e.key === 'D') {
          const hidden = topUi.style.display === 'none';
          topUi.style.display = hidden ? '' : 'none';
          bottomUi.style.display = hidden ? '' : 'none';
        }
      });

      // --- Render loop ---
      const clock = new THREE.Clock();
      let frameCount = 0;
      let lastFpsTime = performance.now();
      const fpsCtrl = gui.controllersRecursive().find(c => c.property === 'fps');

      function animate() {
        requestAnimationFrame(animate);
        dots.forEach(dot => dot.update(clock.getElapsedTime()));
        controls.update();
        renderer.render(scene, camera);

        frameCount++;
        const now = performance.now();
        if (now - lastFpsTime >= 500) {
          fpsData.fps = (frameCount / ((now - lastFpsTime) / 1000)).toFixed(0);
          frameCount = 0;
          lastFpsTime = now;
          if (fpsCtrl) fpsCtrl.updateDisplay();
        }
      }
      animate();
    }

    init().catch(e => {
      console.error('init failed:', e);
      document.body.insertAdjacentHTML('afterbegin',
        `<pre style="color:red;padding:20px;font:14px monospace;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;background:#fff;border:2px solid red;max-width:80%">${e.message}\n${e.stack}</pre>`);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
